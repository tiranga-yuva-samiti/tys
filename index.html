<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiranga Yuva Samiti | Important Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --saffron: #FF9933;
            --white: #FFFFFF;
            --green: #138808;
            --navy: #000080;
            --bg-color: #f9f9f9;
            --text-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Soft gradient background representing the tricolor */
            background: linear-gradient(135deg, rgba(255,153,51,0.1) 0%, rgba(255,255,255,1) 50%, rgba(19,136,8,0.1) 100%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 2.5rem 2rem;
            text-align: center;
            border-top: 5px solid var(--saffron);
            border-bottom: 5px solid var(--green);
            animation: fadeIn 0.8s ease-in-out;
        }

        /* Profile Section */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--navy);
            margin-bottom: 1rem;
            padding: 2px;
        }

        .title {
            color: var(--navy);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .tagline {
            color: #666;
            font-size: 1rem;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        /* Links Section */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-color);
            background-color: var(--bg-color);
            padding: 1rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border: 1px solid #ddd;
            position: relative;
            overflow: hidden;
        }

        .link-btn i {
            position: absolute;
            left: 1.5rem;
            font-size: 1.2rem;
        }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            color: var(--white);
            border-color: transparent;
        }

        /* Unique hover colors for buttons */
        .link-btn.primary:hover { background-color: var(--saffron); }
        .link-btn.secondary:hover { background-color: var(--green); }
        .link-btn.tertiary:hover { background-color: var(--navy); }
        .link-btn.donate:hover { background-color: #e74c3c; }

        /* Social Icons */
        .social-container {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .social-icon {
            color: var(--text-color);
            font-size: 1.8rem;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .social-icon:hover {
            color: var(--saffron);
            transform: scale(1.1);
        }

        /* Share Button */
        .share-btn {
            background: none;
            border: none;
            color: var(--navy);
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin: 0 auto;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            transition: background 0.3s;
        }

        .share-btn:hover {
            background: #f0f0f0;
        }

        /* Footer */
        footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #888;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Toast Notification */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: var(--navy);
            color: #fff;
            text-align: center;
            border-radius: 5px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadeout {
            from {bottom: 30px; opacity: 1;} 
            to {bottom: 0; opacity: 0;}
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="https://via.placeholder.com/150/FF9933/FFFFFF?text=TYS" alt="Tiranga Yuva Samiti Logo" class="profile-img">
            <h1 class="title">Tiranga Yuva Samiti</h1>
            <p class="tagline">Empowering Youth, Building the Nation 🇮🇳</p>
        </header>

        <main class="links-container">
            <a href="https://example.com/join" target="_blank" class="link-btn primary">
                <i class="fa-solid fa-users"></i> Become a Member
            </a>
            <a href="https://example.com/events" target="_blank" class="link-btn secondary">
                <i class="fa-regular fa-calendar-check"></i> Upcoming Events
            </a>
            <a href="https://example.com/gallery" target="_blank" class="link-btn primary">
                <i class="fa-solid fa-images"></i> Photo Gallery
            </a>
            <a href="https://example.com/about" target="_blank" class="link-btn tertiary">
                <i class="fa-solid fa-circle-info"></i> About Our Mission
            </a>
            <a href="https://example.com/donate" target="_blank" class="link-btn donate">
                <i class="fa-solid fa-heart"></i> Support Our Cause
            </a>
        </main>

        <div class="social-container">
            <a href="#" class="social-icon" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></a>
            <a href="#" class="social-icon" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" class="social-icon" aria-label="Twitter"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="#" class="social-icon" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
            <a href="#" class="social-icon" aria-label="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
        </div>

        <button class="share-btn" onclick="sharePage()">
            <i class="fa-solid fa-share-nodes"></i> Share this page
        </button>

        <footer>
            <p>&copy; 2026 Tiranga Yuva Samiti. All rights reserved.</p>
        </footer>
    </div>

    <div id="toast">Link copied to clipboard!</div>

    <script>
        function sharePage() {
            // Check if the Web Share API is available (works on most mobile devices)
            if (navigator.share) {
                navigator.share({
                    title: 'Tiranga Yuva Samiti',
                    text: 'Check out the official links for Tiranga Yuva Samiti!',
                    url: window.location.href
                }).catch(console.error);
            } else {
                // Fallback for desktop: Copy link to clipboard
                navigator.clipboard.writeText(window.location.href).then(() => {
                    showToast();
                });
            }
        }

        function showToast() {
            var toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }
    </script>
</body>
</html>
